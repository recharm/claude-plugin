<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Creator Pick — __BRAND__</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f4f5; color: #18181b; padding-bottom: 60px; }
header { background: #09090b; color: #fff; padding: 32px 40px 28px; }
header .eyebrow { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #71717a; margin-bottom: 8px; }
header h1 { font-size: 22px; font-weight: 700; }
header .persona { font-size: 13px; color: #a1a1aa; margin-top: 8px; max-width: 600px; line-height: 1.5; }
.stats { background: #fff; border-bottom: 1px solid #e4e4e7; padding: 18px 40px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.stat-pill { background: #f4f4f5; border-radius: 999px; padding: 8px 18px; display: flex; align-items: center; gap: 8px; }
.stat-pill .num { font-size: 20px; font-weight: 800; color: #09090b; }
.stat-pill .lbl { font-size: 12px; color: #71717a; white-space: nowrap; }
.stat-sep { width: 1px; height: 28px; background: #e4e4e7; margin: 0 4px; }
.section { padding: 32px 40px 8px; }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #71717a; margin-bottom: 16px; }
.card { background: #fff; border-radius: 16px; border: 1.5px solid #e4e4e7; display: flex; overflow: hidden; margin-bottom: 12px; }
.card.winner { border-color: #16a34a; border-width: 2px; }
.card.runner  { border-color: #3b82f6; }
.poster { width: 110px; min-width: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px 10px; gap: 8px; text-align: center; }
.avatar { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: #fff; flex-shrink: 0; }
.visual-cue { font-size: 10px; line-height: 1.5; color: #71717a; text-align: center; }
.card-body { padding: 18px 20px; flex: 1; border-left: 1px solid #f4f4f5; }
.card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.card-top h2 { font-size: 16px; font-weight: 700; }
.badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px; text-transform: uppercase; letter-spacing: .06em; }
.badge-win { background: #dcfce7; color: #15803d; }
.badge-run { background: #dbeafe; color: #1d4ed8; }
.badge-rej { background: #fee2e2; color: #dc2626; }
.card-body p { font-size: 13.5px; color: #3f3f46; line-height: 1.65; }
.card-body p strong { color: #09090b; }
.card-links { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
.recharm-link { font-size: 12px; font-weight: 500; color: #2563eb; text-decoration: none; }
.recharm-link:hover { text-decoration: underline; }
.recharm-link.all-clips { color: #71717a; }
.recharm-link.all-clips::before { content: "↗ "; }
.divider { border: none; border-top: 1px solid #e4e4e7; margin: 8px 40px 0; }
@media (max-width: 580px) {
  header, .stats, .section { padding-left: 16px; padding-right: 16px; }
  .divider { margin: 8px 16px 0; }
  .poster { width: 80px; min-width: 80px; }
  .avatar { width: 44px; height: 44px; font-size: 16px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script>
const DATA = __DATA_JSON__;

const WINNER_COLORS = ['#16a34a'];
const RUNNER_COLORS = ['#2563eb','#7c3aed','#0891b2'];
const REJECT_COLORS = ['#6b7280','#9ca3af','#a8a29e','#71717a','#78716c'];
const WINNER_BG     = '#f0fdf4';
const RUNNER_BG     = ['#eff6ff','#faf5ff','#ecfeff'];
const REJECT_BG     = '#fafafa';

function initials(name) {
  return name.replace(/[💎✨⭐🔹]/gu, '').trim()
    .split(/\s+/).slice(0, 2).map(w => w[0] || '').join('').toUpperCase() || '?';
}

function clipLink(brand, sym) {
  return `https://app.recharm.com/app/${brand}/?clipId=${sym}`;
}

function allClipsLink(brand, creatorName) {
  const filter  = encodeURIComponent(JSON.stringify({ Creator: [creatorName] }));
  const section = encodeURIComponent('"virtual:All Clips"');
  return `https://app.recharm.com/app/${brand}/?filter=${filter}&section=${section}`;
}

function card(creator, badgeClass, badgeText, avatarColor, posterBg) {
  const { name, visualCue, reason, clipSymbol } = creator;
  const brand = DATA.meta.brand;
  const cues  = (visualCue || '').split(/\s*·\s*|\n/).map(s => s.trim()).filter(Boolean);
  return `
    <div class="card ${badgeClass === 'badge-win' ? 'winner' : badgeClass === 'badge-run' ? 'runner' : ''}">
      <div class="poster" style="background:${posterBg}">
        <div class="avatar" style="background:${avatarColor}">${initials(name)}</div>
        <div class="visual-cue">${cues.join('<br>')}</div>
      </div>
      <div class="card-body">
        <div class="card-top">
          <h2>${name}</h2>
          <span class="badge ${badgeClass}">${badgeText}</span>
        </div>
        <p>${reason}</p>
        <div class="card-links">
          <a class="recharm-link" href="${clipLink(brand, clipSymbol)}" target="_blank">View clip →</a>
          <a class="recharm-link all-clips" href="${allClipsLink(brand, name)}" target="_blank">All clips from this creator</a>
        </div>
      </div>
    </div>`;
}

function render() {
  const { meta, winner, runnersUp = [], rejected = [] } = DATA;
  let html = `
    <header>
      <div class="eyebrow">Creator Casting Report · ${meta.brand}</div>
      <h1>${meta.concept}</h1>
      <div class="persona">${meta.persona}</div>
    </header>
    <div class="stats">
      <div class="stat-pill"><span class="num">${meta.creatorsEvaluated}</span><span class="lbl">Creators evaluated</span></div>
      <div class="stat-sep"></div>
      <div class="stat-pill"><span class="num">${meta.searchesRun}</span><span class="lbl">Searches run</span></div>
      <div class="stat-sep"></div>
      <div class="stat-pill" style="background:#dcfce7"><span class="num" style="color:#15803d">1</span><span class="lbl" style="color:#15803d">Clear winner</span></div>
    </div>
    <div class="section">
      <div class="section-label">✦ The Pick</div>
      ${card(winner, 'badge-win', '✓ Picked', WINNER_COLORS[0], WINNER_BG)}
    </div>`;

  if (runnersUp.length) {
    html += `<hr class="divider"/><div class="section"><div class="section-label">Runners-Up</div>`;
    runnersUp.forEach((c, i) => {
      html += card(c, 'badge-run', 'Runner-Up', RUNNER_COLORS[i % RUNNER_COLORS.length], RUNNER_BG[i % RUNNER_BG.length]);
    });
    html += `</div>`;
  }

  if (rejected.length) {
    html += `<hr class="divider"/><div class="section"><div class="section-label">Rejected</div>`;
    rejected.forEach((c, i) => {
      html += card(c, 'badge-rej', 'Rejected', REJECT_COLORS[i % REJECT_COLORS.length], REJECT_BG);
    });
    html += `</div>`;
  }

  document.getElementById('root').innerHTML = html;
  document.title = `Creator Pick — ${meta.brand}`;
}

render();
</script>
</body>
</html>
